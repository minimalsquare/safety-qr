<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Square | QR Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: #fff; color: #333; margin: 0; }
        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 25px; }
        .input-group { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-black { background: #000; color: #fff; padding: 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.2s; margin-top: 10px; }
        
        #result-area { display: none; margin-top: 40px; text-align: center; width: 100%; }
        
        /* 8.5 * 5.4 카드 디자인 */
        #print-card { 
            width: 8.5cm; height: 5.4cm; border: 1px solid #000; border-radius: 12px; 
            padding: 0; box-sizing: border-box; background: #fff; margin: 0 auto; 
            display: flex; flex-direction: column; justify-content: center;
            position: relative; overflow: hidden; font-family: 'Courier New', Courier, monospace; text-align: left;
        }

        .card-inner { padding: 0 0.5cm; }
        .card-title { margin: 0 0 15px 0; font-size: 17px; font-weight: bold; }
        
        /* 공통 줄 설정 */
        .field-row { display: flex; align-items: flex-end; margin-bottom: 8px; font-size: 11px; font-weight: bold; height: 16px; }
        
        /* 라벨 영역: 가장 긴 'SNS / Messenger ID' 길이에 맞춰 콜론 위치 통일 */
        .label-container { display: flex; width: 135px; justify-content: space-between; flex-shrink: 0; }
        
        /* 일반 줄: QR 코드에 가려지지 않게 여백(margin-right) 부여 */
        .line { border-bottom: 1px solid #000; flex-grow: 1; padding-left: 5px; min-height: 14px; margin-right: 85px; white-space: nowrap; overflow: hidden; }

        /* 마지막 Mail 줄: QR 코드 아래 빈 공간을 활용하여 카드 끝까지 연장 */
        .line-full { border-bottom: 1px solid #000; flex-grow: 1; padding-left: 5px; min-height: 14px; margin-right: 0; white-space: nowrap; overflow: hidden; }

        /* QR 코드 위치: 위로 살짝 올림 (Mail 줄 확보) */
        #qrcode-wrapper {
            position: absolute; right: 0.4cm; top: 1.3cm; /* 위치 상향 조정 */
            width: 75px; height: 75px;
            display: flex; align-items: center; justify-content: center;
        }

        .action-btns { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
        .sub-btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; border: 1.5px solid #000; background: #fff; font-weight: 600; }

        @media print {
            body * { visibility: hidden; }
            #print-card, #print-card * { visibility: visible; }
            #print-card { position: absolute; left: 0; top: 0; border: 1px solid #000 !important; }
            @page { size: 8.5cm 5.4cm; margin: 0; }
        }
    </style>
</head>
<body>
    <h1>MINIMAL SQUARE</h1>
    <div class="input-group">
        <input type="text" id="name" placeholder="Name">
        <input type="tel" id="phone" placeholder="Phone">
        <input type="text" id="sns-type" placeholder="SNS / Messenger">
        <input type="text" id="sns-id" placeholder="SNS / Messenger ID">
        <input type="email" id="email" placeholder="Mail Address">
        <button class="btn-black" onclick="generateQR()">Make QR Code</button>
    </div>

    <div id="result-area">
        <div id="print-card">
            <div class="card-inner">
                <div class="card-title">Personal Identification</div>
                
                <!-- 상단 4개 항목: QR에 가려지지 않도록 margin-right 적용 -->
                <div class="field-row"><div class="label-container"><span>Name</span><span>:</span></div><span id="p-name" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>Phone</span><span>:</span></div><span id="p-phone" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>SNS / Messenger</span><span>:</span></div><span id="p-sns-type" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>SNS / Messenger ID</span><span>:</span></div><span id="p-sns-id" class="line"></span></div>
                
                <!-- 가장 아랫줄 Mail: 카드 전체 폭을 사용하여 길게 확보 -->
                <div class="field-row" style="margin-top:10px;"><div class="label-container"><span>Mail</span><span>:</span></div><span id="p-email" class="line-full"></span></div>
            </div>
            
            <div id="qrcode-wrapper"><div id="qrcode"></div></div>
        </div>

        <div class="action-btns">
            <button class="sub-btn" onclick="window.print()">Print Card</button>
            <button id="download-btn" class="sub-btn">Save QR Image</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
