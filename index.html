<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Square | Safety QR Maker</title>
    <!-- 고정폭 폰트와 브랜드 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 기본 레이아웃 설정 */
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: #f9f9f9; color: #333; margin: 0; }
        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 30px; color: #000; }
        .input-group { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        input { padding: 14px; border: 1px solid #eee; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #000; }
        .btn-black { background: #000; color: #fff; padding: 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 16px; margin-top: 10px; transition: opacity 0.2s; }
        .btn-black:hover { opacity: 0.8; }
        
        /* 카드 디자인 (8.5cm x 5.4cm 표준 규격) */
        #result-area { display: none; margin-top: 50px; text-align: center; width: 100%; }
        #print-card { 
            width: 8.5cm; height: 5.4cm; border: 1px solid #000; border-radius: 12px; 
            padding: 0; box-sizing: border-box; background: #fff; margin: 0 auto; 
            display: flex; flex-direction: column; justify-content: flex-start;
            position: relative; overflow: hidden; text-align: left;
            font-family: 'Courier Prime', monospace; /* 이미지 의도에 따른 고정폭 폰트 */
        }
        .card-inner { padding: 0.6cm 0.6cm; width: 100%; box-sizing: border-box; }
        .card-title { margin: 0 0 25px 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #000; }
        
        /* [핵심] 행간 및 수평 정렬: 라벨과 입력값 바닥을 일치시킴 */
        .field-row { display: flex; align-items: baseline; margin-bottom: 8px; height: 22px; width: 100%; }
        .label-container { display: flex; width: 65px; justify-content: space-between; flex-shrink: 0; margin-right: 10px; font-size: 14px; color: #000; }
        
        /* [핵심] 입력값과 밑줄 디자인 */
        .line { 
            border-bottom: 1.2px solid #000; 
            flex-grow: 1; 
            padding-left: 8px; 
            margin-right: 90px; /* QR 코드 영역 */
            white-space: nowrap; 
            overflow: hidden; 
            font-size: 15px; 
            font-weight: 700; 
            line-height: 1; 
            min-height: 18px;
            color: #000;
        }
        .line-full { 
            border-bottom: 1.2px solid #000; 
            flex-grow: 1; 
            padding-left: 8px; 
            margin-right: 0; 
            white-space: nowrap; 
            overflow: hidden; 
            font-size: 15px; 
            font-weight: 700; 
            line-height: 1; 
            min-height: 18px;
            color: #000;
        }

        /* QR 위치 및 크기 조정 */
        #qrcode-wrapper { position: absolute; right: 0.6cm; top: 1.85cm; width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }
        
        .action-btns { display: flex; gap: 15px; justify-content: center; margin-top: 40px; }
        .sub-btn { padding: 14px 28px; border-radius: 8px; cursor: pointer; font-size: 14px; border: 1.5px solid #000; background: #fff; font-weight: 600; transition: all 0.2s; }
        .sub-btn:hover { background: #f0f0f0; }

        /* 인쇄 최적화 */
        @media print {
            @page { size: 8.5cm 5.4cm; margin: 0; }
            html, body { margin: 0 !important; padding: 0 !important; }
            body * { visibility: hidden; }
            #print-card, #print-card * { visibility: visible; }
            #print-card { position: fixed; left: 0; top: 0; margin: 0; border: 1px solid #000 !important; width: 8.5cm; height: 5.4cm; border-radius: 0; }
        }
    </style>
</head>
<body>
    <h1>Minimal Square</h1>
    <div class="input-group">
        <input type="text" id="name" placeholder="Name (Required)">
        <input type="text" id="phone" placeholder="Phone (+, -, numbers only)" oninput="this.value = this.value.replace(/[^0-9+\-]/g, '')">
        <input type="text" id="sns-type" placeholder="Social (e.g. Kakao, Insta)">
        <input type="text" id="sns-id" placeholder="Social ID">
        <input type="text" id="email" placeholder="Email Address">
        <button class="btn-black" onclick="generateQR()">Create QR Code</button>
    </div>

    <div id="result-area">
        <div id="print-card">
            <div class="card-inner">
                <div class="card-title">Personal Identification</div>
                <div class="field-row"><div class="label-container"><span>Name</span><span>:</span></div><span id="p-name" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>Phone</span><span>:</span></div><span id="p-phone" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>Social</span><span>:</span></div><span id="p-sns-type" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>ID</span><span>:</span></div><span id="p-sns-id" class="line"></span></div>
                <div class="field-row" style="margin-top:2px;"><div class="label-container"><span>Mail</span><span>:</span></div><span id="p-email" class="line-full"></span></div>
            </div>
            <div id="qrcode-wrapper"><div id="qrcode"></div></div>
        </div>
        <div class="action-btns">
            <button class="sub-btn" onclick="window.print()">Print Card</button>
            <button id="download-btn" class="sub-btn">Download Image</button>
        </div>
    </div>

    <script>
        function generateQR() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const snsType = document.getElementById('sns-type').value.trim();
            const snsId = document.getElementById('sns-id').value.trim();
            const email = document.getElementById('email').value.trim();

            // 유효성 검사 (정민님의 비즈니스 로직 적용)
            if (!name) { alert("이름을 입력해주세요."); return; }
            if (!phone && !email && !snsType && !snsId) { alert("연락처를 최소 하나는 입력해야 합니다."); return; }
            if (snsType && !snsId) { alert("SNS ID를 입력해주세요."); return; }
            if (!snsType && snsId) { alert("SNS 종류를 입력해주세요."); return; }
            if (email && !(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))) { alert("올바른 이메일 형식이 아닙니다."); return; }

            // 화면 출력 (데이터가 없어도 빈 줄 유지)
            document.getElementById('p-name').innerText = name || " ";
            document.getElementById('p-phone').innerText = phone || " ";
            document.getElementById('p-sns-type').innerText = snsType || " ";
            document.getElementById('p-sns-id').innerText = snsId || " ";
            document.getElementById('p-email').innerText = email || " ";

            // QR 코드 생성
            const baseUrl = "https://minimalsquare.github.io/safety-qr/view.html"; 
            const queryParams = `?n=${encodeURIComponent(name)}&p=${encodeURIComponent(phone)}&s=${encodeURIComponent(snsType)}&i=${encodeURIComponent(snsId)}&e=${encodeURIComponent(email)}`;
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, {
                text: baseUrl + queryParams, 
                width: 75, height: 75, 
                colorDark: "#000000", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });

            document.getElementById('result-area').style.display = 'block';
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (qrCanvas) {
                const link = document.createElement('a');
                link.download = 'minimal_square_qr.png';
                link.href = qrCanvas.toDataURL();
                link.click();
            }
        });
    </script>
</body>
</html>
