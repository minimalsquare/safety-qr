<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Square | QR Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: #fff; color: #333; margin: 0; }
        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 25px; }
        .input-group { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-black { background: #000; color: #fff; padding: 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.2s; margin-top: 10px; }
        
        #result-area { display: none; margin-top: 40px; text-align: center; width: 100%; }
        #print-card { 
            width: 8.5cm; height: 5.4cm; border: 1px solid #000; border-radius: 12px; 
            padding: 0; box-sizing: border-box; background: #fff; margin: 0 auto; 
            display: flex; flex-direction: column; justify-content: center;
            position: relative; overflow: hidden; text-align: left;
        }
        .card-inner { padding: 0 0.5cm; }
        .card-title { margin: 0 0 8px 0; font-size: 16px; font-weight: 900; letter-spacing: 1px; }
        
        /* 전체 행 높이를 조절하여 넉넉한 공간 확보 */
        .field-row { display: flex; align-items: flex-start; margin-bottom: 2px; font-size: 13.3px; font-weight: 400; height: 32px; }
        .label-container { display: flex; width: 55px; justify-content: space-between; flex-shrink: 0; margin-right: 5px; padding-top: 15px; } 
        
        /* [핵심] 글자와 밑줄을 모두 8px~10px 가량 하향 조정 */
        .line { 
            border-bottom: 1px solid #000; 
            flex-grow: 1; 
            padding-left: 5px; 
            margin-top: 15px; /* 글자 시작 위치를 대폭 내림 */
            padding-bottom: 1px; 
            margin-right: 85px; 
            white-space: nowrap; 
            overflow: hidden; 
            font-size: 13.3px; 
            color: #000; 
            font-weight: 700; 
            line-height: 1; 
            min-height: 14px; 
            display: inline-block; 
        }
        .line-full { 
            border-bottom: 1px solid #000; 
            flex-grow: 1; 
            padding-left: 5px; 
            margin-top: 15px; 
            padding-bottom: 1px; 
            margin-right: 0; 
            white-space: nowrap; 
            overflow: hidden; 
            font-size: 13.3px; 
            color: #000; 
            font-weight: 700; 
            line-height: 1; 
            min-height: 14px; 
            display: inline-block; 
        }

        /* QR 위치: 내려간 줄 위치에 맞춰 조정 */
        #qrcode-wrapper { position: absolute; right: 0.4cm; top: 1.65cm; width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }
        
        .action-btns { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
        .sub-btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; border: 1.5px solid #000; background: #fff; font-weight: 600; }

        @media print {
            @page { size: 8.5cm 5.4cm; margin: 0; }
            html, body { margin: 0 !important; padding: 0 !important; width: 8.5cm; height: 5.4cm; overflow: hidden; }
            body * { visibility: hidden; }
            #print-card, #print-card * { visibility: visible; }
            #print-card { position: fixed; left: 0; top: 0; margin: 0; border: 1px solid #000 !important; box-shadow: none !important; width: 8.5cm; height: 5.4cm; }
        }
    </style>
</head>
<body>
    <h1>Minimal Square</h1>
    <div class="input-group">
        <input type="text" id="name" placeholder="Name (Required)">
        <input type="text" id="phone" placeholder="Phone (+, -, numbers only)" oninput="this.value = this.value.replace(/[^0-9+\-]/g, '')">
        <input type="text" id="sns-type" placeholder="Social Type">
        <input type="text" id="sns-id" placeholder="Social ID">
        <input type="text" id="email" placeholder="Email Address (e.g. name@mail.com)">
        <button class="btn-black" onclick="generateQR()">Create QR Code</button>
    </div>

    <div id="result-area">
        <div id="print-card">
            <div class="card-inner">
                <div class="card-title">Personal Identification</div>
                <div class="field-row"><div class="label-container"><span>Name</span><span>:</span></div><span id="p-name" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>Phone</span><span>:</span></div><span id="p-phone" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>Social</span><span>:</span></div><span id="p-sns-type" class="line"></span></div>
                <div class="field-row"><div class="label-container"><span>ID</span><span>:</span></div><span id="p-sns-id" class="line"></span></div>
                <div class="field-row" style="margin-top:2px;"><div class="label-container"><span>Mail</span><span>:</span></div><span id="p-email" class="line-full"></span></div>
            </div>
            <div id="qrcode-wrapper"><div id="qrcode"></div></div>
        </div>
        <div class="action-btns">
            <button class="sub-btn" onclick="window.print()">Print Card</button>
            <button id="download-btn" class="sub-btn">Save QR Image</button>
        </div>
    </div>

    <script>
        function generateQR() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const snsType = document.getElementById('sns-type').value.trim();
            const snsId = document.getElementById('sns-id').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!name) { alert("이름을 입력해주세요."); return; }
            if (!phone && !email && !snsType && !snsId) { alert("연락처를 최소 하나는 입력해야 합니다."); return; }
            if (snsType && !snsId) { alert("SNS ID를 입력해주세요."); return; }
            if (!snsType && snsId) { alert("SNS 종류를 입력해주세요."); return; }

            if (email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    alert("올바른 이메일 형식이 아닙니다.");
                    return;
                }
            }

            document.getElementById('p-name').innerText = name || " ";
            document.getElementById('p-phone').innerText = phone || " ";
            document.getElementById('p-sns-type').innerText = snsType || " ";
            document.getElementById('p-sns-id').innerText = snsId || " ";
            document.getElementById('p-email').innerText = email || " ";

            const baseUrl = "https://minimalsquare.github.io/safety-qr/view.html"; 
            const queryParams = `?n=${encodeURIComponent(name)}&p=${encodeURIComponent(phone)}&s=${encodeURIComponent(snsType)}&i=${encodeURIComponent(snsId)}&e=${encodeURIComponent(email)}`;
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, {
                text: baseUrl + queryParams, 
                width: 75, height: 75, colorDark: "#000000", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });

            document.getElementById('result-area').style.display = 'block';
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (qrCanvas) {
                const link = document.createElement('a');
                link.download = 'minimal_square_qr.png';
                link.href = qrCanvas.toDataURL();
                link.click();
            }
        });
    </script>
</body>
</html>
